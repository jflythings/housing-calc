/* ── Helpers ── */
const $   = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n||0);
const $k  = n => { if(!n&&n!==0)return"$0"; const a=Math.abs(n); return a>=1e6?`$${(n/1e6).toFixed(2)}M`:a>=1e3?`$${(n/1e3).toFixed(0)}K`:`$${Math.round(n)}`; };
const pct = n => `${(+n||0).toFixed(1)}%`;
const toY = (age,ca) => new Date().getFullYear()+(age-ca);
const CY  = new Date().getFullYear();

/* ── Loan payoff ── */
function loanPayoff(balance, annualRate, monthly) {
  if(balance<=0||monthly<=0) return { months:0, year:CY, totalInterest:0 };
  const r = annualRate/100/12;
  let bal=balance, m=0, totalInt=0;
  while(bal>0.01&&m<600){
    const int = r===0?0:bal*r;
    totalInt+=int;
    const prin=Math.min(monthly-int,bal);
    bal=Math.max(0,bal-prin);
    m++;
  }
  const d=new Date(CY,new Date().getMonth()); d.setMonth(d.getMonth()+m);
  return { months:m, year:d.getFullYear(), totalInterest:totalInt };
}

/* ── Glossary: term → { plain English explanation, law/source link } ── */
const GLOSSARY = {
  "Rule of 55": {
    tip: "If you leave your employer in or after the year you turn 55, you can withdraw from that employer's 401k/TSP penalty-free — no need to wait until 59½. Applies only to the plan at the job you're leaving.",
    url: "https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-exceptions-to-tax-on-early-distributions",
  },
  "Safe Withdrawal Rate": {
    tip: "The percentage of your portfolio you can withdraw each year with a high probability of not running out of money. The classic number is 4% (the 'Trinity Study'). Longer retirements need a lower rate — 3–3.5% for 40–50 year retirements.",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "SWR": {
    tip: "Safe Withdrawal Rate — the percentage of your portfolio you can withdraw annually without depleting it. 4% is the traditional benchmark, but longer retirements may warrant 3–3.5%.",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "Roth Conversion Ladder": {
    tip: "A strategy to access retirement funds before 59½ penalty-free. Convert traditional IRA/401k money to a Roth IRA each year. After 5 years, each converted amount becomes accessible without penalty. Requires planning 5 years ahead.",
    url: "https://www.irs.gov/publications/p590b#en_US_2023_publink100090206",
  },
  "SEPP": {
    tip: "Substantially Equal Periodic Payments (also called 72(t)). Allows penalty-free early withdrawals from IRAs/401ks if you commit to a fixed withdrawal schedule for 5 years or until age 59½ (whichever is longer). Inflexible — modifying the schedule triggers a 10% penalty retroactively.",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "72(t)": {
    tip: "IRS code section that allows penalty-free early retirement withdrawals via Substantially Equal Periodic Payments (SEPP). You commit to a fixed schedule for 5 years or age 59½, whichever comes later.",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "Roth IRA": {
    tip: "An individual retirement account funded with after-tax dollars. Contributions (not earnings) can be withdrawn anytime penalty-free. Earnings are tax-free after age 59½ if the account has been open 5+ years. No required minimum distributions.",
    url: "https://www.irs.gov/publications/p590b",
  },
  "Traditional IRA": {
    tip: "An individual retirement account funded with pre-tax dollars. Contributions may be tax-deductible. Withdrawals in retirement are taxed as ordinary income. Required minimum distributions begin at age 73.",
    url: "https://www.irs.gov/publications/p590a",
  },
  "TSP": {
    tip: "Thrift Savings Plan — the federal government's retirement savings plan, similar to a 401k. Available to military and federal civilian employees. Offers traditional (pre-tax) and Roth options with very low expense ratios.",
    url: "https://www.tsp.gov/publications/tspbk08.pdf",
  },
  "HSA": {
    tip: "Health Savings Account — triple tax advantage: contributions are pre-tax, growth is tax-free, and withdrawals for qualified medical expenses are tax-free. After age 65 withdrawals for any purpose are taxed like a traditional IRA. Must be enrolled in a High Deductible Health Plan (HDHP) to contribute.",
    url: "https://www.irs.gov/publications/p969",
  },
  "VA Disability": {
    tip: "Monthly compensation from the Department of Veterans Affairs for service-connected disabilities. Completely excluded from federal taxable income under 26 U.S.C. § 104. Also excluded from Medicare/Medicaid MAGI calculations, giving you unusual tax planning flexibility.",
    url: "https://www.irs.gov/pub/irs-pdf/p525.pdf",
  },
  "FIRE": {
    tip: "Financial Independence, Retire Early. The point at which your invested portfolio generates enough passive income to cover your living expenses indefinitely — typically calculated as 25x your annual spending (based on the 4% safe withdrawal rate).",
    url: "https://www.irs.gov/retirement-plans/retirement-plans-faqs-regarding-substantially-equal-periodic-payments",
  },
  "FIRE Number": {
    tip: "The total portfolio value needed to retire. Calculated as your annual spending divided by your Safe Withdrawal Rate. Example: $60,000/year spending ÷ 4% SWR = $1,500,000 FIRE number.",
    url: "https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-ira-contribution-limits",
  },
  "Depreciation Recapture": {
    tip: "When you sell a rental property, the IRS 'recaptures' the depreciation deductions you took over the years and taxes them at up to 25% (Section 1250 unrecaptured gain) — even if the property qualifies for the $500K primary residence exclusion. Passing the property to heirs eliminates this via stepped-up basis.",
    url: "https://www.irs.gov/publications/p544",
  },
  "Stepped-Up Basis": {
    tip: "When you inherit an asset, your cost basis is 'stepped up' to the fair market value at the date of death — eliminating any capital gains that accumulated during the deceased's lifetime. A powerful estate planning tool for appreciated assets like real estate.",
    url: "https://www.irs.gov/publications/p559",
  },
  "1031 Exchange": {
    tip: "A provision (IRC Section 1031) allowing you to defer capital gains taxes when selling an investment property by reinvesting the proceeds into a 'like-kind' replacement property within strict time limits: 45 days to identify, 180 days to close.",
    url: "https://www.irs.gov/publications/p544#en_US_2023_publink10009867",
  },
  "Section 121 Exclusion": {
    tip: "If you've lived in a home as your primary residence for 2 of the last 5 years, you can exclude up to $250,000 ($500,000 MFJ) of capital gains from the sale. Does not eliminate depreciation recapture from rental years.",
    url: "https://www.irs.gov/publications/p523",
  },
  "QBI Deduction": {
    tip: "Qualified Business Income deduction (Section 199A) — self-employed individuals and pass-through business owners can deduct up to 20% of qualified business income from taxable income. Subject to income limits and business type restrictions.",
    url: "https://www.irs.gov/newsroom/tax-cuts-and-jobs-act-provision-11011-section-199a-qualified-business-income-deduction-faqs",
  },
  "Solo 401k": {
    tip: "A 401k plan for self-employed individuals with no employees (other than a spouse). Allows contributions as both employee ($23,500 in 2025) and employer (up to 25% of net self-employment income), resulting in much higher potential contributions than a standard IRA.",
    url: "https://www.irs.gov/retirement-plans/one-participant-401k-plans",
  },
  "SEP IRA": {
    tip: "Simplified Employee Pension IRA. Allows self-employed individuals to contribute up to 25% of net self-employment income (max ~$70,000 in 2025). Simpler than a Solo 401k but no Roth option and lower contribution flexibility.",
    url: "https://www.irs.gov/retirement-plans/sep-plan-faqs",
  },
  "Self-Employment Tax": {
    tip: "Self-employed individuals pay both the employee and employer share of Social Security (12.4%) and Medicare (2.9%) taxes — totaling 15.3% on net profit up to the SS wage base, plus 2.9% above it. You can deduct half of SE tax from your AGI.",
    url: "https://www.irs.gov/businesses/small-businesses-self-employed/self-employment-tax-social-security-and-medicare-taxes",
  },
  "S-Corp Election": {
    tip: "A tax election (Form 2553) that allows an LLC to be taxed as an S-Corporation. The owner pays themselves a 'reasonable salary' (subject to payroll/SE tax) and takes remaining profit as distributions (not subject to SE tax) — reducing the 15.3% self-employment tax burden.",
    url: "https://www.irs.gov/businesses/small-businesses-self-employed/s-corporations",
  },
  "MAGI": {
    tip: "Modified Adjusted Gross Income — your AGI with certain deductions added back. Determines eligibility for Roth IRA contributions, ACA premium tax credits, and other benefits. VA disability and Roth IRA withdrawals are excluded from MAGI, giving veterans significant tax planning leverage.",
    url: "https://www.irs.gov/e-file-providers/definition-of-adjusted-gross-income",
  },
  "ACA": {
    tip: "Affordable Care Act. Premium tax credits (subsidies) are available to individuals with MAGI between 100–400% of the Federal Poverty Level. For veterans with VA disability, MAGI can be strategically managed since VA income doesn't count — potentially qualifying for significant subsidies even with substantial total income.",
    url: "https://www.healthcare.gov/glossary/modified-adjusted-gross-income-magi/",
  },
  "RMD": {
    tip: "Required Minimum Distribution — the IRS requires you to begin withdrawing a minimum amount from traditional retirement accounts (401k, TSP, Traditional IRA) each year starting at age 73. Roth IRAs have no RMDs. Failure to take RMDs results in a 25% excise tax on the amount not withdrawn.",
    url: "https://www.irs.gov/retirement-plans/plan-participant-employee/retirement-topics-required-minimum-distributions-rmds",
  },
  "NOL": {
    tip: "Net Operating Loss — when your business deductions exceed your business income, the loss can be carried forward to offset taxable income in future profitable years, dollar-for-dollar. Useful when starting a business with initial losses.",
    url: "https://www.irs.gov/publications/p536",
  },
  "DEA": {
    tip: "Dependents' Educational Assistance (Chapter 35) — VA benefit providing up to 45 months of education benefits to eligible dependents of veterans with a permanent and total (P&T) disability rating or who died from a service-connected condition. Entirely separate from GI Bill transfer.",
    url: "https://www.va.gov/education/survivor-dependent-benefits/dependents-education-assistance/",
  },
  "Chapter 35": {
    tip: "Dependents' Educational Assistance program — VA education benefit for dependents of veterans rated permanently and totally disabled. Up to 45 months per eligible dependent. Check eligibility at va.gov.",
    url: "https://www.va.gov/education/survivor-dependent-benefits/dependents-education-assistance/",
  },
  "GI Bill": {
    tip: "Post-9/11 GI Bill (Chapter 33) provides up to 36 months of education benefits including tuition, housing allowance, and book stipend. Benefits are tied to the veteran and can be transferred to dependents only while still on active duty with sufficient service obligation remaining.",
    url: "https://www.va.gov/education/about-gi-bill-benefits/post-9-11/",
  },
  "529 Plan": {
    tip: "A tax-advantaged savings account for education expenses. Contributions are post-tax but grow tax-free; withdrawals for qualified education expenses are tax-free. Up to $35,000 lifetime can be rolled into a Roth IRA (per beneficiary) after 15 years if unused for education.",
    url: "https://www.irs.gov/pub/irs-pdf/p970.pdf",
  },
  "Roth 401k": {
    tip: "A 401k contribution option where you contribute after-tax dollars. Grows tax-free, and qualified withdrawals are tax-free. Unlike a Roth IRA, Roth 401k accounts are subject to Required Minimum Distributions unless rolled over to a Roth IRA. Withdrawals don't count toward MAGI.",
    url: "https://www.irs.gov/retirement-plans/roth-comparison-chart",
  },
  "Traditional 401k": {
    tip: "Pre-tax retirement contributions that reduce your taxable income today. Grows tax-deferred. Withdrawals in retirement are taxed as ordinary income. Subject to RMDs at age 73. Early withdrawals (before 59½) face a 10% penalty plus income tax.",
    url: "https://www.irs.gov/retirement-plans/401k-plans",
  },
  "Employer Match": {
    tip: "Free money from your employer added to your 401k when you contribute. Common structure: 100% match on first 3–6% of salary you contribute. Always contribute at least enough to capture the full match — it's an immediate 100% return.",
    url: "https://www.irs.gov/retirement-plans/plan-sponsor/401k-plan-fix-it-guide-employer-matching-contributions",
  },
};

/* ── Term Component: tooltip explanation + inline law link ── */
function Term({ children, term }) {
  const [show, setShow] = useState(false);
  const entry = GLOSSARY[term || children];
  if (!entry) return <span>{children}</span>;
  return (
    <span style={{ position: "relative", display: "inline-block" }}>
      <a
        href={entry.url}
        target="_blank"
        rel="noopener noreferrer"
        onMouseEnter={() => setShow(true)}
        onMouseLeave={() => setShow(false)}
        style={{ borderBottom: `1px dashed ${C.cyanDim}`, cursor: "pointer", color: C.text, textDecoration: "none" }}
        title="View source law / IRS publication"
      >
        {children} <span style={{ color: C.cyanDim, fontSize: 9, verticalAlign: "super", opacity: 0.7 }}>↗</span>
      </a>
      {show && (
        <div style={{
          position: "absolute", bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)",
          background: "#0d1a2e", border: `1px solid ${C.cyanDim}`, borderRadius: 8,
          padding: "10px 13px", width: 280, zIndex: 999,
          fontSize: 11, color: C.dim, lineHeight: 1.6, boxShadow: "0 4px 24px rgba(0,0,0,0.6)",
          pointerEvents: "none",
        }}>
          <div style={{ fontWeight: 600, color: C.cyan, marginBottom: 4, fontSize: 11 }}>{term || children}</div>
          {entry.tip}
        </div>
      )}
    </span>
  );
}

/* ── Pure SVG Area Chart — no external dependencies ── */
function ResponsiveAreaChart({ data, retAge, ssAge, fireNum, hasMortgage, mortPayoffAge, curAge }) {
  const [tooltip, setTooltip] = useState(null);
  const svgRef = useRef(null);
  if (!data || data.length === 0) return null;

  const W = 860, H = 300, ML = 70, MR = 30, MT = 28, MB = 28;
  const PW = W - ML - MR, PH = H - MT - MB;

  const ages  = data.map(d => d.age);
  const vals  = data.map(d => d.bal);
  const minAge = ages[0], maxAge = ages[ages.length - 1];
  const maxVal = Math.max(...vals, fireNum || 0) * 1.08;

  const xS = age  => ML + ((age - minAge) / (maxAge - minAge)) * PW;
  const yS = val  => MT + PH - (val / maxVal) * PH;

  // Build path
  const pts = data.map(d => `${xS(d.age).toFixed(1)},${yS(d.bal).toFixed(1)}`).join(" L ");
  const linePath = `M ${pts}`;
  const areaPath = `${linePath} L ${xS(maxAge).toFixed(1)},${(MT+PH).toFixed(1)} L ${xS(minAge).toFixed(1)},${(MT+PH).toFixed(1)} Z`;

  // Y axis ticks
  const yTicks = [];
  const step = maxVal / 4;
  for (let i = 0; i <= 4; i++) yTicks.push(i * step);

  // X axis ticks — every 5 years
  const xTicks = ages.filter(a => a % 5 === 0);

  // Hover handler
  const handleMouseMove = (e) => {
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const scaleX = W / rect.width;
    const mx = (e.clientX - rect.left) * scaleX;
    const age = Math.round(minAge + ((mx - ML) / PW) * (maxAge - minAge));
    const d = data.find(d => d.age === age);
    if (d && mx >= ML && mx <= ML + PW) {
      setTooltip({ age: d.age, bal: d.bal, x: xS(d.age), y: yS(d.bal) });
    } else {
      setTooltip(null);
    }
  };

  const refLines = [
    { age: retAge,        label: "Retire",       color: C.gold,   dash: "6 3" },
    ssAge ? { age: ssAge, label: "SS starts",    color: C.gold,   dash: "3 3" } : null,
    { age: 65,            label: "Medicare",     color: C.green,  dash: "4 4" },
    hasMortgage && mortPayoffAge ? { age: mortPayoffAge, label: "Mortgage off", color: "#b78bfa", dash: "4 4" } : null,
  ].filter(Boolean);

  return (
    <div style={{ width:"100%", overflowX:"auto" }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:330, display:"block" }}
        onMouseMove={handleMouseMove} onMouseLeave={()=>setTooltip(null)}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%"  stopColor={C.cyan} stopOpacity={0.28}/>
            <stop offset="95%" stopColor={C.cyan} stopOpacity={0.02}/>
          </linearGradient>
        </defs>

        {/* Grid lines */}
        {yTicks.map(v => (
          <line key={v} x1={ML} x2={ML+PW} y1={yS(v).toFixed(1)} y2={yS(v).toFixed(1)}
            stroke={C.border} strokeDasharray="3 3" strokeWidth={1}/>
        ))}

        {/* Y axis labels */}
        {yTicks.map(v => (
          <text key={v} x={ML-6} y={yS(v)+4} textAnchor="end" fontSize={9}
            fill={C.muted} fontFamily="JetBrains Mono,monospace">{$k(v)}</text>
        ))}

        {/* X axis labels */}
        {xTicks.map(a => (
          <text key={a} x={xS(a)} y={MT+PH+14} textAnchor="middle" fontSize={9}
            fill={C.muted} fontFamily="JetBrains Mono,monospace">{a}</text>
        ))}

        {/* FIRE # reference line */}
        {fireNum > 0 && (
          <>
            <line x1={ML} x2={ML+PW} y1={yS(fireNum).toFixed(1)} y2={yS(fireNum).toFixed(1)}
              stroke={C.gold} strokeDasharray="3 3" strokeWidth={1}/>
            <text x={ML+PW+2} y={yS(fireNum)+4} fontSize={9} fill={C.gold}
              fontFamily="JetBrains Mono,monospace">FIRE #</text>
          </>
        )}

        {/* Vertical reference lines */}
        {refLines.map(r => r.age >= minAge && r.age <= maxAge && (
          <g key={r.label}>
            <line x1={xS(r.age).toFixed(1)} x2={xS(r.age).toFixed(1)}
              y1={MT} y2={MT+PH} stroke={r.color} strokeDasharray={r.dash} strokeWidth={1.5}/>
            <text x={xS(r.age)+3} y={MT+10} fontSize={9} fill={r.color}
              fontFamily="JetBrains Mono,monospace">{r.label}</text>
          </g>
        ))}

        {/* Area fill */}
        <path d={areaPath} fill="url(#areaGrad)"/>

        {/* Line */}
        <path d={linePath} fill="none" stroke={C.cyan} strokeWidth={2}/>

        {/* Tooltip */}
        {tooltip && (
          <g>
            <line x1={tooltip.x} x2={tooltip.x} y1={MT} y2={MT+PH}
              stroke={C.muted} strokeWidth={1} strokeDasharray="2 2"/>
            <circle cx={tooltip.x} cy={tooltip.y} r={4} fill={C.cyan}/>
            <rect x={Math.min(tooltip.x+8, ML+PW-130)} y={tooltip.y-36}
              width={120} height={38} rx={6} fill="#0d1a2e" stroke={C.border}/>
            <text x={Math.min(tooltip.x+14, ML+PW-124)} y={tooltip.y-20}
              fontSize={10} fill={C.gold} fontFamily="JetBrains Mono,monospace" fontWeight={600}>
              Age {tooltip.age} · {toY(tooltip.age, curAge)}
            </text>
            <text x={Math.min(tooltip.x+14, ML+PW-124)} y={tooltip.y-7}
              fontSize={11} fill={C.cyan} fontFamily="JetBrains Mono,monospace">
              {$k(tooltip.bal)}
            </text>
          </g>
        )}
      </svg>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   DEFAULT STATE — generic starting point for any user
══════════════════════════════════════════════════════════════ */
const DEFAULTS = {
  /* Profile */
  curAge:35, retAge:55, planAge:90,
  /* Salary */
  salary:75000, salaryGrowth:3, spouseIncome:0,
  /* VA Disability (optional) */
  hasVA:false, vaAnnual:0, vaCola:2.5, vaHealthVet:false,
  /* Social Security */
  hasSS:false, ssAge:67, ssMonthly:1800,
  /* Account balances */
  tspBalance:0, retirement401k:0, rothIRA:0, brokerage:0, hsa:0, cash:10000,
  /* Contributions */
  trad401kPct:6, roth401kPct:0, empMatchPct:3, empBasePct:0,
  hsaAnnual:0, hsaMax:8300, hsaMaxYear:2028,
  /* Payroll pre-tax HC premium */
  hcPremiumPerPaycheck:0,
  /* Roth IRA annual contribution */
  rothIRAContrib:0,
  rothIRAOpenYear: new Date().getFullYear(),
  /* Extra monthly brokerage investing (overflow above Roth IRA max) */
  monthlyBrokerageContrib:0,
  /* Mortgage */
  hasMortgage:true, mortTotal:2000, mortPI:1400, mortBal:300000, mortRate:6.5, mortPayoff:2054,
  /* Debts */
  debt1Name:"Car Loan", debt1Bal:0, debt1Rate:5.0, debt1Monthly:0,
  debt2Name:"Car Loan 2", debt2Bal:0, debt2Rate:3.0, debt2Monthly:0,
  debt3Name:"401k Loan", debt3Bal:0, debt3Rate:0, debt3Monthly:0,
  /* Living expenses */
  electric:200, water:100, phone:50, internet:60, food:700,
  carInsurance:150, gasMonthly:150, other:500,
  /* Retirement */
  retRatio:80, retExtras:500,
  /* Healthcare */
  vetHC:50, spouseHC:500, post65HC:350,
  /* Assumptions */
  growth:9, inflation:3, swr:4, stateTax:0,
};

/* ══════════════════════════════════════════════════════════════
   MAIN
══════════════════════════════════════════════════════════════ */
function RetirementCalc() {
  const [tab, setTab] = useState("dashboard");
  const [p, setP]     = useState(DEFAULTS);  const set = (k,v) => setP(prev=>({ ...prev, [k]:v }));

  /* ══════ CORE MATH ══════ */
  const C2 = useMemo(()=>{
    /* ── Loans ── */
    const debt1  = loanPayoff(p.debt1Bal,  p.debt1Rate,  p.debt1Monthly);
    const debt2  = loanPayoff(p.debt2Bal,  p.debt2Rate,  p.debt2Monthly);
    const debt3  = loanPayoff(p.debt3Bal,  p.debt3Rate,  p.debt3Monthly);
    const mort   = loanPayoff(p.mortBal,   p.mortRate,   p.mortPI);
    const totalNonMortDebt    = p.debt1Bal+p.debt2Bal+p.debt3Bal;
    const monthlyDebtPayments = p.debt1Monthly+p.debt2Monthly+p.debt3Monthly;
    const debtFreeYear = Math.max(
      p.debt1Bal>0?debt1.year:CY,
      p.debt2Bal>0?debt2.year:CY,
      p.debt3Bal>0?debt3.year:CY,
    );

    /* ── Portfolio totals ── */
    const totalRetirement = p.tspBalance+p.retirement401k+p.rothIRA;
    const totalInvested   = totalRetirement+p.brokerage+p.hsa;
    const totalLiquid     = totalInvested+p.cash;

    /* ── Contributions ── */
    const tradAmt = p.salary*(p.trad401kPct/100);
    const rothAmt = p.salary*(p.roth401kPct/100);
    const empM    = p.salary*(p.empMatchPct/100);
    const empB    = p.salary*(p.empBasePct/100);
    const empTotal = empM+empB;
    const hsaForYr = yr => yr>=p.hsaMaxYear ? p.hsaMax : p.hsaAnnual+Math.max(0,(yr-CY)/(p.hsaMaxYear-CY))*(p.hsaMax-p.hsaAnnual);
    const annualToAccounts = tradAmt+rothAmt+empM+empB+p.hsaAnnual+p.rothIRAContrib;

    /* ── Taxes MFJ 2025 ── */
    const hcPremAnnual = p.hcPremiumPerPaycheck*26;
    const preTax  = tradAmt+p.hsaAnnual+hcPremAnnual;
    const agi     = Math.max(0, p.salary-preTax);
    const taxable = Math.max(0, agi-30000); // 2025 MFJ standard deduction $30,000
    // Bracket widths (not cumulative tops) for 2025 MFJ
    const bkts = [[23850,.10],[73100,.12],[109750,.22],[187900,.24],[106450,.32],[250550,.35],[Infinity,.37]];
    let fedTax=0, rem=taxable;
    for(const [cap,r] of bkts){ const t=Math.min(rem,cap); fedTax+=t*r; rem-=t; if(rem<=0)break; }
    const fica       = p.salary*0.0765;
    const stateTaxAmt= agi*(p.stateTax/100);
    const takeHome   = (p.salary-preTax-rothAmt-fica-fedTax-stateTaxAmt)/12;
    const vaMonthly  = p.hasVA ? p.vaAnnual/12 : 0;
    const totalIncome= takeHome+vaMonthly+(p.spouseIncome/12);

    /* ── Monthly expenses ── */
    const livingMonthly = p.electric+p.water+p.phone+p.internet+p.food+p.carInsurance+p.gasMonthly+p.other;
    const mortMonthly   = p.hasMortgage ? p.mortTotal : 0;
    const totalExp      = mortMonthly+livingMonthly+monthlyDebtPayments;
    const cashFlow      = totalIncome-totalExp;

    /* ── Healthcare at retirement ── */
    const hcMonthly = (age,yrsR) => {
      const inf = Math.pow(1+p.inflation/100*1.25, yrsR);
      if(age>=65) return p.post65HC*2*inf;
      const youCost = p.hasVA&&p.vaHealthVet ? p.vetHC : p.spouseHC;
      return (youCost+p.spouseHC)*inf;
    };

    /* ── FIRE number ── */
    const ytt       = Math.max(0, p.retAge-p.curAge);
    const infMult   = Math.pow(1+p.inflation/100, ytt);
    const livInfl   = livingMonthly*12*(p.retRatio/100)*infMult;
    const extInfl   = p.retExtras*12*infMult;
    const mortAtRet = p.hasMortgage&&(CY+ytt)<=p.mortPayoff ? p.mortTotal*12 : 0;
    const hcAtRet   = hcMonthly(p.retAge,0)*12;
    const vaAtRet   = p.hasVA ? p.vaAnnual*Math.pow(1+p.vaCola/100,ytt) : 0;
    const ssAtRet   = p.hasSS&&p.ssAge<=p.retAge ? p.ssMonthly*12*infMult : 0;
    const guaranteedIncome = vaAtRet+ssAtRet;
    const totalNeed = livInfl+extInfl+mortAtRet+hcAtRet;
    const drawNeeded= Math.max(0, totalNeed-guaranteedIncome);
    // Duration-adjusted SWR — longer retirement needs lower withdrawal rate
    const retirementYears = p.planAge - p.retAge;
    const durationSWR = retirementYears >= 50 ? Math.min(p.swr, 3.0) :
                        retirementYears >= 45 ? Math.min(p.swr, 3.25) :
                        retirementYears >= 40 ? Math.min(p.swr, 3.5) :
                        retirementYears >= 35 ? Math.min(p.swr, 3.75) :
                        p.swr;
    const fireNum     = drawNeeded/(durationSWR/100);
    // Convert to today's dollars so the number is comparable across retirement ages
    const fireNumReal = fireNum/infMult;  // what you'd need to have TODAY
    const vaEquiv   = p.hasVA ? vaAtRet/(p.swr/100) : 0;
    const ssEquiv   = p.hasSS ? ssAtRet/(p.swr/100) : 0;

    /* ── Simulate portfolio ── */
    const simulate = retAge => {
      let ret=totalRetirement+p.hsa, brok=p.brokerage;
      let ok=true;
      const data=[];
      for(let age=p.curAge;age<=p.planAge;age++){
        const yr=CY+(age-p.curAge), yrs=age-p.curAge, inRet=age>=retAge, yrsR=age-retAge;
        if(!inRet){
          const sal = p.salary*Math.pow(1+p.salaryGrowth/100,yrs);
          const contrib = sal*((p.trad401kPct+p.roth401kPct+p.empMatchPct+p.empBasePct)/100)+hsaForYr(yr);
          const loanRepay = (p.debt3Bal>0&&yrs*12<debt3.months) ? p.debt3Monthly*12 : 0;
          ret  = ret*(1+p.growth/100)+contrib+loanRepay;
          brok = brok*(1+(p.growth)/100)+p.rothIRAContrib+p.monthlyBrokerageContrib*12;
        } else {
          const lInfl  = livingMonthly*12*(p.retRatio/100)*Math.pow(1+p.inflation/100,yrs);
          const eInfl  = p.retExtras*12*Math.pow(1+p.inflation/100,yrs);
          const mAnn   = p.hasMortgage&&yr<=p.mortPayoff ? p.mortTotal*12 : 0;
          const hcAnn  = hcMonthly(age,yrsR)*12;
          const vaAnn  = p.hasVA ? p.vaAnnual*Math.pow(1+p.vaCola/100,yrs) : 0;
          const ssAnn  = p.hasSS&&age>=p.ssAge ? p.ssMonthly*12*Math.pow(1+p.inflation/100,yrs) : 0;
          const draw   = Math.max(0, lInfl+eInfl+mAnn+hcAnn-vaAnn-ssAnn);
          ret  = ret*(1+p.growth/100)-draw*0.85;
          brok = brok*(1+(p.growth-1)/100)-draw*0.15;
          if(ret+brok<0){ ok=false; ret=0; brok=0; }
        }
        data.push({ age, bal:Math.round(Math.max(0,ret+brok)), curAge:p.curAge });
      }
      return { ok, data, final:data[data.length-1]?.bal||0 };
    };

    /* ── Sweep FIRE ages ── */
    let earliest=null;
    const sweep=[];
    for(let ra=40;ra<=72;ra++){
      const { ok,final }=simulate(ra);
      if(ok&&!earliest) earliest=ra;
      sweep.push({ age:ra, ok, final });
    }
    const { data:chart }=simulate(p.retAge);

    /* ── Projected balance at target ── */
    let proj=totalInvested;
    for(let i=0;i<ytt;i++){
      const yr=CY+i, sal=p.salary*Math.pow(1+p.salaryGrowth/100,i);
      const loanRepay=(p.debt3Bal>0&&i*12<debt3.months)?p.debt3Monthly*12:0;
      proj=proj*(1+p.growth/100)+sal*((p.trad401kPct+p.roth401kPct+p.empMatchPct+p.empBasePct)/100)+hsaForYr(yr)+p.rothIRAContrib+p.monthlyBrokerageContrib*12+loanRepay;
    }
    const projReal    = proj/infMult;     // projected portfolio in today's purchasing power
    const pctFunded = fireNumReal>0 ? Math.min(200,(totalInvested/fireNumReal)*100) : 100;
    const surplus   = projReal-fireNumReal; // both in today's dollars

    const rothIRAFiveYearSatisfied = (CY - p.rothIRAOpenYear) >= 5;
    const rule55Applies = p.retAge >= 55;
    return {
      rothIRAFiveYearSatisfied, rule55Applies,
      debt1, debt2, debt3, mort,
      totalNonMortDebt, monthlyDebtPayments, debtFreeYear,
      totalRetirement, totalInvested, totalLiquid,
      tradAmt, rothAmt, empM, empB, empTotal, annualToAccounts,
      hcPremAnnual, preTax, agi, fedTax, fica, stateTaxAmt,
      takeHome, vaMonthly, totalIncome,
      livingMonthly, mortMonthly, totalExp, cashFlow,
      hcAtRet, mortAtRet, vaAtRet, ssAtRet, guaranteedIncome, vaEquiv, ssEquiv,
      totalNeed, drawNeeded, fireNum, fireNumReal, projReal, durationSWR, retirementYears, pctFunded, proj, surplus,
      earliest, sweep, chart, ytt, infMult,
    };
  }, [p]);

  const tabs = [
    { id:"dashboard",  l:"🎯 Dashboard" },
    { id:"profile",    l:"👤 Profile" },
    { id:"networth",   l:"💼 Net Worth" },
    { id:"debts",      l:"💳 Debts" },
    { id:"cashflow",   l:"💵 Cash Flow" },
    { id:"retbudget",  l:"🧾 Ret. Budget" },
    { id:"projection", l:"📈 Projections" },
    { id:"assumptions",l:"⚙️ Assumptions" },
  ];

  /* ══════ RENDER ══════ */
  return (
    <div style={S.body}>

      {/* ── HEADER ── */}
      <div style={S.header}>
        <div style={{ maxWidth:1140, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ ...S.serif, fontSize:26, fontWeight:700, color:C.text, lineHeight:1 }}>
                Retirement <span style={{ color:C.cyan }}>Command Center</span>
              </div>
              <div style={{ fontSize:11, color:C.muted, marginTop:3 }}>
                Early Retirement & Financial Independence Planner · {CY}
              </div>
            </div>
            <div style={{ display:"flex", gap:18, flexWrap:"wrap" }}>
              {[
                { l:"Earliest FIRE",  v:C2.earliest?`Age ${C2.earliest}`:"—",      s:C2.earliest?`${toY(C2.earliest,p.curAge)} · ${C2.earliest-p.curAge} yrs`:"Adjust inputs", c:C2.earliest?C.green:C.red },
                { l:"FIRE Number (today's $)", v:$k(C2.fireNumReal), s:`Age ${p.retAge} · ${C2.durationSWR}% SWR · ${C2.retirementYears}-yr plan`, c:C.gold },
                { l:"Total Invested", v:$k(C2.totalInvested),                       s:`+${$(p.cash)} cash`, c:C.text },
                { l:"Funded Today",   v:pct(C2.pctFunded),                          s:"of FIRE number", c:C2.pctFunded>=100?C.green:C.cyan },
              ].map(({ l,v,s,c })=>(
                <div key={l} style={{ textAlign:"right" }}>
                  <div style={{ fontSize:9, letterSpacing:"0.1em", textTransform:"uppercase", color:C.muted }}>{l}</div>
                  <div style={{ ...S.mono, fontSize:20, fontWeight:600, color:c, lineHeight:1.1 }}>{v}</div>
                  <div style={{ fontSize:10, color:C.muted }}>{s}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ height:3, background:C.border, borderRadius:3, margin:"12px 0 12px", overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${Math.min(100,C2.pctFunded)}%`, background:`linear-gradient(90deg,${C.cyanDim},${C.cyan})`, borderRadius:3 }}/>
          </div>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
            {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{ ...S.tab(tab===t.id), border:"none", cursor:"pointer" }}>{t.l}</button>)}
          </div>
        </div>
      </div>

      {/* ── PAGE ── */}
      <div style={{ maxWidth:1140, margin:"0 auto", padding:"24px 20px" }}>

        {/* ══ DASHBOARD ══ */}
        {tab==="dashboard"&&(
          <div>
            {/* stat row */}
            <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:14 }}>
              {[
                { l:"Monthly Income",   v:$(C2.totalIncome),  s:"After-tax + guaranteed income",         c:C.green },
                { l:"Monthly Expenses", v:$(C2.totalExp),     s:"All bills, debt payments & living",      c:C.orange },
                { l:"Cash Flow",        v:$(C2.cashFlow),     s:"Monthly surplus / deficit",              c:C2.cashFlow>=0?C.cyan:C.red },
                { l:"Annual to Accts",  v:$k(C2.annualToAccounts), s:`You + employer contributions`,      c:C.cyan },
              ].map(({ l,v,s,c })=>(
                <div key={l} style={{ ...S.stat, flex:1, minWidth:145 }}>
                  <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color:C.muted, marginBottom:5 }}>{l}</div>
                  <div style={{ ...S.mono, fontSize:19, fontWeight:600, color:c, lineHeight:1.1 }}>{v}</div>
                  <div style={{ fontSize:10, color:C.muted, marginTop:3 }}>{s}</div>
                </div>
              ))}
            </div>

            {/* Guaranteed income block — only shows if VA or SS enabled */}
            {(p.hasVA||p.hasSS)&&(
              <div style={{ ...S.card, border:`1px solid rgba(34,199,122,0.3)`, background:"linear-gradient(135deg,#071410 0%,#0c1322 100%)", marginBottom:14 }}>
                <Head title="🛡️ GUARANTEED INCOME FLOOR" color={C.green} sub="Income that arrives regardless of market performance"/>
                <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                  {p.hasVA&&(
                    <div style={{ flex:1, minWidth:200, background:"#07101e", borderRadius:10, padding:"14px 16px" }}>
                      <div style={{ fontSize:11, fontWeight:600, color:C.green, marginBottom:6 }}>🎖️ VA Disability</div>
                      <div style={{ ...S.mono, fontSize:20, color:C.green }}>{$(p.vaAnnual/12)}<span style={{ fontSize:11, color:C.muted }}>/mo</span></div>
                      <div style={{ fontSize:10, color:C.muted, marginTop:4 }}>At age {p.retAge}: {$(C2.vaAtRet/12)}/mo · Portfolio equiv: {$k(C2.vaEquiv)}</div>
                      <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>Tax-free · COLA-adjusted · Does not count toward ACA income</div>
                    </div>
                  )}
                  {p.hasSS&&(
                    <div style={{ flex:1, minWidth:200, background:"#07101e", borderRadius:10, padding:"14px 16px" }}>
                      <div style={{ fontSize:11, fontWeight:600, color:C.gold, marginBottom:6 }}>📋 Social Security</div>
                      <div style={{ ...S.mono, fontSize:20, color:C.gold }}>{$(p.ssMonthly)}<span style={{ fontSize:11, color:C.muted }}>/mo</span></div>
                      <div style={{ fontSize:10, color:C.muted, marginTop:4 }}>Claiming at age {p.ssAge} · Portfolio equiv: {$k(C2.ssEquiv)}</div>
                      <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>
                        {p.ssAge>p.retAge?`Starts ${p.ssAge-p.retAge} yrs into retirement — bridge with portfolio until then`:"Starts at retirement"}
                      </div>
                    </div>
                  )}
                  {(p.hasVA||p.hasSS)&&(
                    <div style={{ flex:1, minWidth:200, background:"rgba(34,199,122,0.07)", borderRadius:10, padding:"14px 16px", border:`1px solid rgba(34,199,122,0.2)` }}>
                      <div style={{ fontSize:11, fontWeight:600, color:C.green, marginBottom:6 }}>✓ Combined Floor</div>
                      <div style={{ ...S.mono, fontSize:20, color:C.green }}>{$(C2.guaranteedIncome/12)}<span style={{ fontSize:11, color:C.muted }}>/mo</span></div>
                      <div style={{ fontSize:10, color:C.muted, marginTop:4 }}>Covers {pct((C2.guaranteedIncome/C2.totalNeed)*100)} of projected retirement expenses</div>
                      <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>Portfolio only needs to cover: {$(C2.drawNeeded/12)}/mo</div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* FIRE grid */}
            <div style={S.card}>
              <Head title="FIRE FEASIBILITY BY RETIREMENT AGE" sub={`Click any age to set as target · Currently: Age ${p.retAge}`}/>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {C2.sweep.filter(f=>f.age>=40&&f.age<=70).map(f=>{
                  const isFire=f.age===C2.earliest, isTgt=f.age===p.retAge;
                  return (
                    <div key={f.age} onClick={()=>set("retAge",f.age)} style={{
                      padding:"7px 10px", borderRadius:8, textAlign:"center", minWidth:50, cursor:"pointer",
                      background:isFire?C.cyanGlow:isTgt?"rgba(244,185,66,0.1)":f.ok?"rgba(34,199,122,0.05)":"rgba(242,86,112,0.05)",
                      border:`1px solid ${isFire?C.cyan:isTgt?C.gold:f.ok?"rgba(34,199,122,0.3)":"rgba(242,86,112,0.15)"}`,
                    }}>
                      <div style={{ ...S.mono, fontSize:14, fontWeight:600, color:isFire?C.cyan:isTgt?C.gold:f.ok?C.green:C.muted }}>{f.age}</div>
                      <div style={{ fontSize:8, color:isFire?C.cyan:isTgt?C.gold:f.ok?C.green:C.red, marginTop:1 }}>
                        {isFire?"FIRE":isTgt?"TARGET":f.ok?"✓":"✗"}
                      </div>
                    </div>

                  { name:p.debt2Name, bal:p.debt2Bal, mo:p.debt2Monthly, po:C2.debt2, c:C.gold },
                  { name:p.debt3Name, bal:p.debt3Bal, mo:p.debt3Monthly, po:C2.debt3, c:C.purple },
                  ...(p.hasMortgage?[{ name:"Mortgage", bal:p.mortBal, mo:p.mortPI, po:C2.mort, c:C.dim }]:[]),
                ].filter(d=>d.bal>0).sort((a,b)=>a.po.months-b.po.months).map(({ name,bal,mo,po,c })=>(
                  <div key={name} style={{ marginBottom:14 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                      <span style={{ fontSize:12, color:C.dim }}>{name}</span>
                      <span style={{ ...S.mono, fontSize:12, color:c }}>Free: ~{po.year}</span>
                    </div>
                    <div style={{ height:5, background:C.border, borderRadius:3, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:"40%", background:c, borderRadius:3 }}/>
                    </div>
                    <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>{$(mo)}/mo · {po.months} months · {$(po.totalInterest)} interest</div>
                  </div>
                ))}

                {C2.totalNonMortDebt>0&&(
                  <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:14, marginTop:4 }}>
                    <div style={{ fontSize:11, fontWeight:600, color:C.green, marginBottom:10 }}>CASCADING CASH FLOW UNLOCKS</div>
                    {[
                      p.debt1Bal>0&&{ yr:C2.debt1.year, freed:p.debt1Monthly, label:p.debt1Name },
                      p.debt2Bal>0&&{ yr:C2.debt2.year, freed:p.debt2Monthly, label:p.debt2Name },
                      p.debt3Bal>0&&{ yr:C2.debt3.year, freed:p.debt3Monthly, label:p.debt3Name },
                      p.hasMortgage&&{ yr:C2.mort.year,   freed:p.mortTotal,    label:"Mortgage" },
                    ].filter(Boolean).sort((a,b)=>a.yr-b.yr).map(({ yr,freed,label })=>(
                      <div key={label} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:`1px solid ${C.border}` }}>
                        <span style={{ fontSize:12, color:C.muted }}>{yr} — {label} paid off</span>
                        <span style={{ ...S.mono, fontSize:12, color:C.green }}>+{$(freed)}/mo freed</span>
                      </div>
                    ))}
                    <div style={{ marginTop:10, background:"rgba(34,199,122,0.06)", borderRadius:8, padding:"10px 14px" }}>
                      <KV k="Non-mortgage debt total" v={$(C2.totalNonMortDebt)} vc={C.orange}/>
                      <KV k="Monthly payments freed (non-mort)" v={$(C2.monthlyDebtPayments)} vc={C.green} bold/>
                      <KV k="Portfolio equiv. if invested" v={$k(C2.monthlyDebtPayments*12/(p.swr/100))} vc={C.green} bold/>
                    </div>
                  </div>
                )}
              </div>

              <div style={{ ...S.card, border:`1px solid rgba(244,185,66,0.2)` }}>
                <Head title="🧠 DEBT STRATEGY GUIDE" color={C.gold}/>
                <div style={{ fontSize:10, color:C.muted, lineHeight:1.7, marginBottom:10 }}>
                  Compare your debt rate vs. expected investment return ({pct(p.growth)}):
                </div>
                {[
                  { range:"Rate < inflation", verdict:"Pay minimum only", detail:"Negative real rate — the bank is subsidizing you. Invest every surplus dollar.", c:C.green },
                  { range:`Rate < ${pct(p.growth/2)} (half growth)`, verdict:"Pay minimum, invest surplus", detail:"Math strongly favors investing over debt payoff.", c:C.green },
                  { range:`Rate ${pct(p.growth/2)}–${pct(p.growth)} (half to full growth)`, verdict:"Your call", detail:"Paying down debt here is a guaranteed return equal to the rate. Risk tolerance decides.", c:C.gold },
                  { range:`Rate > ${pct(p.growth)}`, verdict:"Pay aggressively", detail:"Guaranteed return beats expected market return. Avalanche method (highest rate first).", c:C.red },
                ].map(({ range,verdict,detail,c })=>(
                  <div key={range} style={{ borderBottom:`1px solid ${C.border}`, paddingBottom:9, marginBottom:9 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                      <span style={{ fontSize:11, color:C.muted }}>{range}</span>
                      <span style={{ fontSize:11, fontWeight:600, color:c }}>{verdict}</span>
                    </div>
                    <div style={{ fontSize:10, color:C.muted, lineHeight:1.5 }}>{detail}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ══ CASH FLOW ══ */}
        {tab==="cashflow"&&(
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
            <div>
              <div style={S.card}>
                <Head title="💵 MONTHLY CASH FLOW — COMPLETE PICTURE"/>
                <SectionDivider label="INCOME" color={C.green}/>
                <KV k="Take-home (after all payroll deductions)" v={$(C2.takeHome)} vc={C.green}/>
                {p.hasVA&&<KV k="VA Disability (monthly)" v={$(C2.vaMonthly)} vc={C.green}/>}
                {p.spouseIncome>0&&<KV k="Spouse income (monthly)" v={$(p.spouseIncome/12)} vc={C.green}/>}
                <KV k="Total monthly income" v={$(C2.totalIncome)} vc={C.green} bold/>

                {p.hasMortgage&&<><SectionDivider label="HOUSING" color={C.red}/>
                <KV k="Mortgage (P&I + escrow)" v={`(${$(p.mortTotal)})`} vc={C.red}/></>}

                {C2.monthlyDebtPayments>0&&<><SectionDivider label="DEBT PAYMENTS" color={C.orange}/>
                {p.debt1Bal>0&&<KV k={p.debt1Name} v={`(${$(p.debt1Monthly)})`} vc={C.orange}/>}
                {p.debt2Bal>0&&<KV k={p.debt2Name} v={`(${$(p.debt2Monthly)})`} vc={C.gold}/>}
                {p.debt3Bal>0&&<KV k={p.debt3Name} v={`(${$(p.debt3Monthly)})`} vc={C.purple}/>}
                <KV k="Total debt payments" v={`(${$(C2.monthlyDebtPayments)})`} vc={C.orange} bold/></>}

                <SectionDivider label="LIVING EXPENSES" color={C.muted}/>
                {C2.hcPremAnnual>0&&<KV k="Healthcare premiums (pre-tax payroll)" v={`(${$(Math.round(C2.hcPremAnnual/12))})`} vc={C.green}/>}
                <KV k="Electric" v={`(${$(p.electric)})`}/>
                <KV k="Water & Sewer" v={`(${$(p.water)})`}/>
                <KV k="Phone" v={`(${$(p.phone)})`}/>
                <KV k="Internet" v={`(${$(p.internet)})`}/>
                <KV k="Food / Groceries" v={`(${$(p.food)})`}/>
                <KV k="Car Insurance" v={`(${$(p.carInsurance)})`}/>
                <KV k="Gas / Transportation" v={`(${$(p.gasMonthly)})`}/>
                <KV k="Other (misc.)" v={`(${$(p.other)})`}/>
                <KV k="Total living" v={`(${$(Math.round(C2.livingMonthly))})`} vc={C.muted} bold/>

                <div style={{ borderTop:`2px solid ${C.border}`, paddingTop:10, marginTop:6 }}>
                  <KV k="NET MONTHLY CASH FLOW" v={$(C2.cashFlow)} vc={C2.cashFlow>=0?C.cyan:C.red} bold/>
                  <KV k="Annual surplus / deficit" v={$(C2.cashFlow*12)} vc={C2.cashFlow>=0?C.cyan:C.red} bold/>
                </div>
              </div>
            </div>

            <div>
              <div style={S.card}>
                <Head title="⚙️ EXPENSE INPUTS" sub="Adjust to update cash flow in real time"/>
                <Field label="Payroll HC/dental premium per paycheck" value={p.hcPremiumPerPaycheck} onChange={v=>set("hcPremiumPerPaycheck",v)} prefix="$" step={1} note="Pre-tax Section 125 deduction — reduces AGI and federal tax"/>
                <Field label="Electric" value={p.electric} onChange={v=>set("electric",v)} prefix="$"/>
                <Field label="Water & Sewer" value={p.water} onChange={v=>set("water",v)} prefix="$"/>
                <Field label="Phone" value={p.phone} onChange={v=>set("phone",v)} prefix="$"/>
                <Field label="Internet" value={p.internet} onChange={v=>set("internet",v)} prefix="$"/>
                <Field label="Food / Groceries" value={p.food} onChange={v=>set("food",v)} prefix="$"/>
                <Field label="Car Insurance (monthly)" value={p.carInsurance} onChange={v=>set("carInsurance",v)} prefix="$"/>
                <Field label="Gas / Transportation (monthly)" value={p.gasMonthly} onChange={v=>set("gasMonthly",v)} prefix="$"/>
                <Field label="Other (misc. monthly)" value={p.other} onChange={v=>set("other",v)} prefix="$"/>
              </div>

              {C2.monthlyDebtPayments>0&&(
                <div style={{ ...S.card, border:`1px solid rgba(34,199,122,0.2)` }}>
                  <Head title="🚀 CASH FLOW AFTER DEBT PAYOFF" color={C.green}/>
                  <KV k="Current monthly cash flow" v={$(C2.cashFlow)} vc={C2.cashFlow>=0?C.cyan:C.red}/>
                  {p.debt1Bal>0&&<KV k={`+ ${p.debt1Name} freed`} v={`+${$(p.debt1Monthly)}/mo`} vc={C.orange}/>}
                  {p.debt2Bal>0&&<KV k={`+ ${p.debt2Name} freed`} v={`+${$(p.debt2Monthly)}/mo`} vc={C.gold}/>}
                  {p.debt3Bal>0&&<KV k={`+ ${p.debt3Name} freed`} v={`+${$(p.debt3Monthly)}/mo`} vc={C.purple}/>}
                  <KV k="Post-debt monthly cash flow" v={$(C2.cashFlow+C2.monthlyDebtPayments)} vc={C.green} bold/>
                  <div style={{ fontSize:10, color:C.muted, marginTop:8, lineHeight:1.6 }}>
                    Redirect freed payments into brokerage — don't let lifestyle inflation absorb them. {$(C2.monthlyDebtPayments*12)}/yr invested = {$k(C2.monthlyDebtPayments*12*((Math.pow(1+p.growth/100,p.retAge-p.curAge)-1)/(p.growth/100)))} at retirement.
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ══ RETIREMENT BUDGET ══ */}
        {tab==="retbudget"&&(()=>{
          const ytt   = Math.max(0,p.retAge-p.curAge);
          const inf   = Math.pow(1+p.inflation/100,ytt);
          const livingNow = C2.livingMonthly;
          const retLiving = livingNow*12*(p.retRatio/100)*inf;
          const retExtras = p.retExtras*12*inf;
          const mortAnn   = p.hasMortgage&&(CY+ytt)<=p.mortPayoff ? p.mortTotal*12 : 0;
          const hcPre65   = C2.hcAtRet*12;
          const hcPost65  = p.post65HC*2*12*inf;
          const vaIncome  = C2.vaAtRet;
          const ssIncome  = C2.ssAtRet;
          const totalAnn  = retLiving+retExtras+mortAnn+hcPre65;
          const drawAnn   = C2.drawNeeded;
          const drawMo    = drawAnn/12;
          const maxDraw   = C2.proj*C2.durationSWR/100/12;
          const todayEq   = v => v/inf;

          const BRow = ({ label, ann, color, indent, bold, note }) => (
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:`1px solid ${C.border}`, paddingLeft:indent?16:0 }}>
              <div>
                <span style={{ fontSize:12, color:bold?C.dim:C.muted }}>{label}</span>
                {note&&<div style={{ fontSize:10, color:C.muted, marginTop:1 }}>{note}</div>}
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ ...S.mono, fontSize:12, color:color||C.text, fontWeight:bold?600:400 }}>{$(ann/12)}<span style={{ fontSize:10, color:C.muted }}>/mo</span></div>
                <div style={{ fontSize:10, color:C.muted }}>{$(ann)}/yr</div>
              </div>
            </div>
          );

          return (
            <div>
            {p.retAge<55&&(
              <div style={{ background:"rgba(242,86,112,0.07)",border:"1px solid rgba(242,86,112,0.35)",borderRadius:10,padding:"14px 18px",marginBottom:14 }}>
                <div style={{ fontSize:12,fontWeight:600,color:C.red,marginBottom:6 }}>⚠ Retiring Before 55 — Key Restrictions</div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                  <div style={{ fontSize:10,color:C.muted,lineHeight:1.7 }}>
                    <strong style={{color:C.text}}><Term>Rule of 55</Term> does NOT apply.</strong><br/>
                    401k and <Term>TSP</Term> withdrawals before 55 carry a 10% penalty on top of income tax unless you use a <Term>Roth Conversion Ladder</Term> (5-year runway needed).<br/><br/>
                    <strong style={{color:C.text}}><Term>Roth IRA</Term> — contributions only.</strong><br/>
                    You can withdraw what you <em>put in</em> (your contribution basis) tax-free and penalty-free. But earnings are locked until 59½. Know your contribution basis.
                  </div>
                  <div style={{ fontSize:10,color:C.muted,lineHeight:1.7 }}>
                    <strong style={{color:C.text}}>What you CAN access before 55:</strong><br/>
                    ✓ <Term>VA Disability</Term> (always)<br/>
                    ✓ Social Security if claiming (if applicable)<br/>
                    ✓ Taxable brokerage (LTCG rates)<br/>
                    ✓ <Term>Roth IRA</Term> contributions (not earnings)<br/>
                    ✓ <Term>HSA</Term> for medical expenses<br/><br/>
                    <strong style={{color:C.red}}>Needs planning:</strong> Traditional 401k/<Term>TSP</Term> → <Term>Roth Conversion Ladder</Term> required.
                  </div>
                </div>
              </div>
            )}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
              <div>
                <div style={S.card}>
                  <Head title={`🧾 EXPENSES AT AGE ${p.retAge} (${CY+ytt})`} sub={`Future dollars · ${p.inflation}% inflation · ${ytt} years from now`}/>

                  <SectionDivider label="HOUSING" color={C.red}/>
                  <BRow label="Mortgage" ann={mortAnn} color={mortAnn>0?C.orange:C.green} bold
                    note={mortAnn>0?`Active until ${p.mortPayoff}`:`Paid off ✓ — saves ${$(p.mortTotal)}/mo`}/>

                  <SectionDivider label="HEALTHCARE" color={C.orange}/>
                  <BRow label="Your coverage (pre-65)" ann={(p.hasVA&&p.vaHealthVet?p.vetHC:p.spouseHC)*12*inf} color={C.orange} indent/>
                  <BRow label="Spouse / family coverage (pre-65)" ann={p.spouseHC*12*inf} color={C.orange} indent/>
                  <BRow label="Total pre-65 healthcare" ann={hcPre65} color={C.red} bold note={`Post-65 (Medicare both): ${$(hcPost65/12)}/mo`}/>

                  <SectionDivider label="LIVING" color={C.muted}/>
                  <BRow label={`Utilities & living (${p.retRatio}% of today)`} ann={livingNow*12*(p.retRatio/100)*inf} indent/>
                  <BRow label="Extras — travel, hobbies, fun" ann={retExtras} color={C.gold} indent/>
                  <BRow label="Total living" ann={retLiving+retExtras} bold/>

                  <div style={{ borderTop:`2px solid ${C.border}`, paddingTop:10, marginTop:6 }}>
                    <BRow label="TOTAL ANNUAL EXPENSES" ann={totalAnn} color={C.red} bold/>
                  </div>

                  <div style={{ background:"#07101e", borderRadius:8, padding:"10px 14px", marginTop:10 }}>
                    <div style={{ fontSize:10, color:C.dim, fontWeight:600, marginBottom:4 }}>In today's dollars (what it "feels like")</div>
                    <KV k="Monthly" v={$(todayEq(totalAnn)/12)} vc={C.text}/>
                    <KV k="Annual" v={$(todayEq(totalAnn))} vc={C.text}/>
                  </div>
                </div>

                <div style={S.card}>
                  <Head title="🎛️ LIFESTYLE LEVERS" sub="Adjust to see FIRE number impact instantly"/>
                  <Slider label="Non-housing spending vs. today" value={p.retRatio} onChange={v=>set("retRatio",v)} min={50} max={130} fmt={v=>`${v}% = ${$(livingNow*v/100)}/mo today`}/>
                  <Field label="Monthly extras (travel, fun, hobbies)" value={p.retExtras} onChange={v=>set("retExtras",v)} prefix="$" suffix="/mo" note="Budget for the retirement you actually want"/>
                  <div style={{ background:"rgba(244,185,66,0.07)", border:"1px solid rgba(244,185,66,0.2)", borderRadius:8, padding:"10px 14px", marginTop:4 }}>
                    <div style={{ fontSize:10, color:C.gold, fontWeight:600, marginBottom:6 }}>Each $100/mo more in retirement spending:</div>
                    <KV k="Adds to annual need" v={$(1200)+"/yr"} vc={C.orange}/>
                    <KV k="Adds to FIRE number" v={$k(1200/(p.swr/100))} vc={C.red}/>
                    <KV k="Roughly adds to working years" v="~0.5–1 year" vc={C.red}/>
                  </div>
                </div>
              </div>

              <div>
                <div style={{ ...S.card, border:`1px solid rgba(34,199,122,0.3)` }}>
                  <Head title={`💰 INCOME AT AGE ${p.retAge}`} color={C.green} sub="All sources combined"/>

                  {(p.hasVA||p.hasSS)&&<SectionDivider label="GUARANTEED INCOME" color={C.green}/>}
                  {p.hasVA&&<BRow label="VA Disability (COLA-adjusted)" ann={vaIncome} color={C.green} bold note={`Today: ${$(p.vaAnnual/12)}/mo → At ${p.retAge}: ${$(vaIncome/12)}/mo`}/>}
                  {p.hasSS&&p.ssAge<=p.retAge&&<BRow label={`Social Security (age ${p.ssAge})`} ann={ssIncome} color={C.gold} bold/>}
                  {p.hasSS&&p.ssAge>p.retAge&&<BRow label={`SS starts at ${p.ssAge} (${p.ssAge-p.retAge} yrs in)`} ann={0} color={C.muted} note={`Bridge from portfolio until age ${p.ssAge}`}/>}

                  <SectionDivider label="PORTFOLIO MATH" color={C.cyan}/>
                  <BRow label="Total expenses" ann={totalAnn} color={C.red}/>
                  {(p.hasVA||p.hasSS)&&<BRow label="Minus guaranteed income" ann={-C2.guaranteedIncome} color={C.green}/>}
                  <BRow label="Net portfolio draw needed" ann={drawAnn} color={C.orange} bold note={`${$(drawMo)}/mo from your investment portfolio`}/>

                  <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:12, marginTop:6 }}>
                    <SectionDivider label="THE KEY NUMBERS" color={C.cyan}/>
                    <div style={{ fontSize:9,color:C.muted,marginBottom:4,letterSpacing:"0.08em" }}>FUTURE DOLLARS (at age {p.retAge})</div>
                    <KV k={`FIRE number (${C2.durationSWR}% SWR · ${C2.retirementYears}-yr plan)`} v={$k(C2.fireNum)} vc={C.gold} bold/>
                    <KV k="Projected portfolio at retirement" v={$k(C2.proj)} vc={C2.proj>=C2.fireNum?C.green:C.red} bold/>
                    <KV k="Maximum safe monthly draw" v={$(maxDraw)} vc={C2.proj>=C2.fireNum?C.green:C.orange} bold/>
                    <KV k="You need monthly" v={$(drawMo)} vc={C.orange} bold/>
                    <KV k="Buffer / shortfall" v={`${maxDraw>=drawMo?"+":""}${$(maxDraw-drawMo)}/mo`} vc={maxDraw>=drawMo?C.green:C.red} bold/>
                    <div style={{ fontSize:9,color:C.muted,marginTop:6,letterSpacing:"0.08em" }}>TODAY'S DOLLARS (for intuitive comparison)</div>
                    <KV k="FIRE number (today's $)" v={$k(C2.fireNumReal)} vc={C.gold}/>
                    <KV k="Projected portfolio (today's $)" v={$k(C2.projReal)} vc={C2.projReal>=C2.fireNumReal?C.green:C.red}/>
                  </div>

                  {maxDraw>=drawMo
                    ?<div style={{ marginTop:10, background:"rgba(34,199,122,0.07)", border:"1px solid rgba(34,199,122,0.25)", borderRadius:8, padding:"10px 14px" }}>
                      <div style={{ fontSize:11, color:C.green, fontWeight:600, marginBottom:4 }}>✓ Funded — you have a surplus</div>
                      <div style={{ fontSize:10, color:C.muted, lineHeight:1.6 }}>
                        Portfolio can support {$(maxDraw)}/mo. You need {$(drawMo)}/mo. {$(maxDraw-drawMo)}/mo of buffer — or you could retire earlier. SWR of {C2.durationSWR}% used for {C2.retirementYears}-year retirement.
                      </div>
                    </div>
                    :<div style={{ marginTop:10, background:"rgba(242,86,112,0.07)", border:"1px solid rgba(242,86,112,0.25)", borderRadius:8, padding:"10px 14px" }}>
                      <div style={{ fontSize:11, color:C.red, fontWeight:600, marginBottom:4 }}>⚠ Shortfall at this retirement age</div>
                      <div style={{ fontSize:10, color:C.muted, lineHeight:1.6 }}>
                        Portfolio supports {$(maxDraw)}/mo but you need {$(drawMo)}/mo. Gap: {$(drawMo-maxDraw)}/mo. Try a later target age, reduce expenses, or increase contributions. SWR of {C2.durationSWR}% used for {C2.retirementYears}-year retirement.
                      </div>
                    </div>
                  }
                </div>

                <div style={S.card}>
                  <Head title="🏦 WITHDRAWAL ORDER (CRITICAL)" color={C.cyan}/>
                  <div style={{ fontSize:10, color:C.muted, lineHeight:1.6, marginBottom:10 }}>
                    The order you draw from accounts affects taxes, <Term>ACA</Term> subsidies, and portfolio longevity. This sequence minimizes all three.
                  </div>
                  {[
                    { n:"1", src:<><Term>VA Disability</Term> · Social Security · Guaranteed income first</>, detail:"Spend this before touching any portfolio. It's yours regardless of market conditions.", c:C.green },
                    { n:"2", src:p.retAge>=55?<><Term>Roth 401k</Term> (stay in employer plan)</>:p.retAge>=59.5?<><Term>Roth IRA</Term> (full access)</>:<><Term>Roth IRA</Term> — contributions only ⚠</>, detail:p.retAge>=55?"Rule of 55: penalty-free access to Roth 401k including ALL earnings at 55+. Do NOT roll to IRA before 59½ — you lose Rule of 55 on earnings. Tax-free, MAGI-neutral.":p.retAge>=59.5?"Full tax-free access to all contributions and earnings — no restrictions.":"IMPORTANT: Only your direct contributions (principal you deposited) are accessible before 59½ — not earnings. Earnings are locked until 59½. Track your contribution basis carefully.", c:p.retAge<55&&p.retAge<59.5?C.orange:C.cyan },
                    { n:"3", src:<><Term>HSA</Term> (for medical only)</>, detail:"Triple tax-advantaged. Tax-free for qualified medical expenses. Never pay healthcare from other accounts while HSA balance exists.", c:C.purple },
                    { n:"4", src:<><Term>Roth IRA</Term> contributions + taxable brokerage</>, detail:"Roth IRA contribution basis (not earnings) accessible anytime. Brokerage at long-term capital gains rates. Manage to stay in 0% LTCG bracket if possible.", c:C.gold },
                    { n:"5", src:p.retAge>=55?<><Term>Traditional 401k</Term> / <Term>TSP</Term> (<Term>Rule of 55</Term>)</>:<><Term>Traditional 401k</Term> / <Term>TSP</Term> / IRA</>, detail:p.retAge>=55?"Rule of 55 eliminates the 10% penalty. Withdrawals are taxable ordinary income — manage amounts carefully to preserve ACA subsidy and stay in lower brackets.":"Taxable ordinary income. Without Rule of 55, need a Roth conversion ladder for penalty-free access before 59½.", c:C.orange },
                    { n:"6", src:<>After 59½: roll everything to IRAs</>, detail:"Once 59½ passes, roll Roth 401k → Roth IRA and traditional 401k → Traditional IRA for more investment flexibility. No more penalty concerns.", c:C.dim },
                  ].map(({ n,src,detail,c })=>(
                    <div key={n} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
                      <div style={{ ...S.mono, fontSize:15, color:c, fontWeight:700, minWidth:18, lineHeight:1.2 }}>{n}</div>
                      <div>
                        <div style={{ fontSize:12, color:C.text, fontWeight:500 }}>{src}</div>
                        <div style={{ fontSize:10, color:C.muted, marginTop:2, lineHeight:1.5 }}>{detail}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
          );
        })()}

        {/* ══ PROJECTIONS ══ */}
        {tab==="projection"&&(
          <div>
            <div style={S.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, flexWrap:"wrap", gap:10 }}>
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:C.cyan }}>PORTFOLIO PROJECTION — RETIRING AGE {p.retAge} ({toY(p.retAge,p.curAge)})</div>
                  <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>{p.growth}% growth · {p.inflation}% inflation · {p.swr}% SWR · to age {p.planAge}</div>
                </div>
                <div style={{ ...S.mono, fontSize:12 }}>
                  {C2.surplus>=0
                    ?<span style={{ color:C.green }}>✓ ON TRACK — {$k(C2.surplus)} projected surplus</span>
                    :<span style={{ color:C.red }}>⚠ {$k(Math.abs(C2.surplus))} projected shortfall</span>}
                </div>
              </div>
              <ResponsiveAreaChart
                data={C2.chart}
                retAge={p.retAge}
                ssAge={p.hasSS && p.ssAge > p.retAge ? p.ssAge : null}
                fireNum={C2.fireNum}
                hasMortgage={p.hasMortgage}
                mortPayoffAge={p.hasMortgage ? p.mortPayoff - CY + p.curAge : null}
                curAge={p.curAge}
              />
            </div>

            <div style={S.card}>
              <Head title="RETIREMENT AGE FEASIBILITY TABLE" sub="Click any row to update target age"/>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontFamily:"'JetBrains Mono',monospace", fontSize:11 }}>
                  <thead>
                    <tr>{["Age","Year","Yrs Away","Sustainable?",`Balance @ ${p.planAge}`,"Status"].map(h=>(
                      <th key={h} style={{ padding:"7px 10px", borderBottom:`1px solid ${C.border}`, color:C.muted, fontWeight:700, fontSize:9, letterSpacing:"0.08em", textAlign:"left" }}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {C2.sweep.filter(f=>f.age>=40&&f.age<=70).map(f=>{
                      const isFire=f.age===C2.earliest, isTgt=f.age===p.retAge;
                      return (
                        <tr key={f.age} style={{ background:isFire?C.cyanGlow:isTgt?"rgba(244,185,66,0.05)":"transparent", cursor:"pointer" }}
                          onClick={()=>set("retAge",f.age)}>
                          <td style={{ padding:"7px 10px", color:isFire?C.cyan:isTgt?C.gold:C.text, fontWeight:(isFire||isTgt)?700:400 }}>Age {f.age}</td>
                          <td style={{ padding:"7px 10px", color:C.dim }}>{toY(f.age,p.curAge)}</td>
                          <td style={{ padding:"7px 10px", color:C.dim }}>{f.age-p.curAge} yrs</td>
                          <td style={{ padding:"7px 10px", color:f.ok?C.green:C.red }}>{f.ok?"✓ Yes":"✗ No"}</td>
                          <td style={{ padding:"7px 10px", color:f.ok?C.text:C.muted }}>{f.ok?$k(f.final):"Depleted"}</td>
                          <td style={{ padding:"7px 10px" }}>
                            {isFire&&<span style={{ background:C.cyanGlow, border:`1px solid ${C.cyan}`, color:C.cyan, padding:"2px 7px", borderRadius:4, fontSize:9 }}>EARLIEST FIRE</span>}
                            {isTgt&&!isFire&&<span style={{ background:"rgba(244,185,66,0.1)", border:`1px solid ${C.gold}`, color:C.gold, padding:"2px 7px", borderRadius:4, fontSize:9 }}>YOUR TARGET</span>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ══ ASSUMPTIONS ══ */}
        {tab==="assumptions"&&(
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
            <div>
              <div style={S.card}>
                <Head title="📈 MARKET ASSUMPTIONS"/>
                <Slider label="Portfolio growth rate (nominal)" value={p.growth} onChange={v=>set("growth",v)} min={3} max={12} step={0.5} fmt={v=>`${v}%/yr`}/>
                <div style={{ fontSize:10, color:C.muted, marginBottom:12, lineHeight:1.5 }}>
                  S&P 500 historical nominal average: ~10–11%. Balanced portfolio (stocks+bonds): 6–8%. Conservative: 5–6%. The calculator grows portfolio at this rate AND independently inflates future expenses — they are not netted.
                </div>
                <Slider label="Inflation rate" value={p.inflation} onChange={v=>set("inflation",v)} min={1} max={8} step={0.25} fmt={v=>`${v}%/yr`}/>
                <div style={{ fontSize:10, color:C.muted, marginBottom:12, lineHeight:1.5 }}>
                  Applied to all future expenses. Healthcare inflates at 1.25× this rate. VA COLA and SS COLA are set separately.
                </div>
                <Slider label="Safe Withdrawal Rate (SWR)" value={p.swr} onChange={v=>set("swr",v)} min={2} max={6} step={0.25} fmt={v=>`${v}% = ${Math.round(100/v)}x rule`}/>
                <div style={{ fontSize:10, color:C.muted, marginBottom:12, lineHeight:1.5 }}>
                  4% = Trinity Study standard (30-yr retirement). 3.5% = recommended for early retirement (35–50 year horizon). 3% = very conservative / perpetual portfolio.
                </div>
                <Slider label="Plan to age (longevity)" value={p.planAge} onChange={v=>set("planAge",v)} min={80} max={105} fmt={v=>`Age ${v}`}/>
              </div>

              <div style={{ ...S.card, border:`1px solid rgba(244,185,66,0.2)` }}>
                <Head title="🔬 SENSITIVITY ANALYSIS" color={C.gold} sub="How single variables shift your FIRE number"/>
                {[
                  ["SWR 3% (ultra conservative, 50yr+)", $k(C2.drawNeeded/0.03/C2.infMult)],
                  ["SWR 3.5% (FIRE standard, 40yr+)", $k(C2.drawNeeded/0.035/C2.infMult)],
                  ["SWR 4% (Trinity Study, 30yr)", $k(C2.drawNeeded/0.04/C2.infMult)],
                  [`Current (${C2.durationSWR}% · ${C2.retirementYears}-yr plan)`, $k(C2.fireNumReal)+" today's $"],
                  ["$500/mo less spending in retirement", $k((C2.drawNeeded-6000)/C2.durationSWR*100/C2.infMult)],
                  ["$500/mo more spending in retirement", $k((C2.drawNeeded+6000)/C2.durationSWR*100/C2.infMult)],
                  ...(p.hasVA?[["VA rating +$500/mo", $k((C2.drawNeeded-6000)/C2.durationSWR*100/C2.infMult)]]:[]),
                ].map(([k,v])=><KV key={k} k={k} v={v}/>)}
              </div>
            </div>

            <div>
              <div style={S.card}>
                <Head title="🔓 EARLY RETIREMENT ACCESS STRATEGIES" color={C.purple}/>

                {/* Rule of 55 */}
                <div style={{ background:"rgba(34,199,122,0.06)",border:"1px solid rgba(34,199,122,0.2)",borderRadius:10,padding:"14px 16px",marginBottom:14 }}>
                  <div style={{ fontSize:12,fontWeight:600,color:C.green,marginBottom:6 }}>
                    Rule of 55 {p.retAge>=55?"✓ Applies to your plan":"— Does not apply (retiring before 55)"}
                  </div>
                  <div style={{ fontSize:10,color:C.muted,lineHeight:1.7 }}>
                    If you separate from your employer in or after the calendar year you turn 55, you can withdraw from that employer's 401k or TSP <strong style={{color:C.text}}>penalty-free immediately</strong> — no conversion ladder needed.<br/><br/>
                    <strong style={{color:C.text}}>Applies to both traditional AND Roth portions</strong> of the same 401k.<br/>
                    <strong style={{color:C.red}}>Critical:</strong> do NOT roll the 401k into an IRA before withdrawing — you lose Rule of 55 protection on earnings. Wait until 59½ to roll over.<br/><br/>
                    Only applies to the plan at the employer you're leaving at 55. Old 401ks from prior jobs must be rolled INTO your current plan first to qualify.
                  </div>
                </div>

                {/* Roth IRA 5-year strategy */}
                <div style={{ background:"rgba(183,139,250,0.06)",border:"1px solid rgba(183,139,250,0.2)",borderRadius:10,padding:"14px 16px",marginBottom:14 }}>
                  <div style={{ fontSize:12,fontWeight:600,color:C.purple,marginBottom:6 }}>
                    Roth IRA Strategy — Open Now, Use Later
                  </div>
                  <div style={{ fontSize:10,color:C.muted,lineHeight:1.7 }}>
                    Open a Roth IRA today even if you only contribute $1 — the 5-year clock starts January 1 of the first contribution year and satisfies in {CY+5}.<br/><br/>
                    <strong style={{color:C.text}}>Before 59½ you can access:</strong><br/>
                    • Direct contributions — anytime, tax-free, penalty-free, no MAGI impact<br/>
                    • Rolled-over Roth 401k principal — after 5-year rule satisfied<br/>
                    • Earnings — locked until 59½ (this is the only limitation)<br/><br/>
                    <strong style={{color:C.text}}>When you roll Roth 401k → Roth IRA:</strong> the IRA's existing 5-year clock governs — not the 401k's. As long as your Roth IRA is 5+ years old, you're immediately covered for principal access.
                  </div>
                </div>

                {/* Roth Conversion Ladder — for pre-55 retirees */}
                <div style={{ background:p.retAge<55?"rgba(0,238,255,0.06)":"#07101e",border:p.retAge<55?"1px solid rgba(0,238,255,0.2)":`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px" }}>
                  <div style={{ fontSize:12,fontWeight:600,color:p.retAge<55?C.cyan:C.muted,marginBottom:6 }}>
                    Roth Conversion Ladder {p.retAge<55?"✓ Relevant for your plan":"— Less critical (Rule of 55 covers you)"}
                  </div>
                  <div style={{ fontSize:10,color:C.muted,lineHeight:1.7 }}>
                    For accessing traditional 401k / IRA money before 59½ without penalty (mainly relevant if retiring before 55):<br/><br/>
                    1. Retire → income drops → convert $X traditional → Roth IRA at low tax rate<br/>
                    2. Each converted dollar starts a 5-year clock independently<br/>
                    3. Live on VA income, Roth contributions, brokerage during the 5-year wait<br/>
                    4. Year 6+: withdraw converted principal tax-free and penalty-free<br/><br/>
                    Still useful at any age for <strong style={{color:C.text}}>tax management</strong> — converting in low-income retirement years reduces lifetime tax bill even when penalty isn't an issue.
                  </div>
                </div>
              </div>

              <div style={S.card}>
                <Head title="✅ UNIVERSAL PRIORITY LIST"/>
                {[
                  { n:1, a:"Get the full employer 401k match",             w:"Free money — 100% instant return. Always capture 100% before anything else." },
                  { n:2, a:"Build a 3–6 month emergency fund",             w:"Foundation of everything. Without this, one event derails the whole plan." },
                  { n:3, a:"Open a Roth IRA immediately (even $1)", w:`Start the 5-year clock now. Clock satisfies in ${CY+5}. Critical for rolling in Roth 401k later and for pre-59½ earnings access.` },
                  { n:4, a:"Max HSA ($8,300 family / $4,300 individual)", w:"Triple tax advantage — pre-tax in, tax-free growth, tax-free medical out. Best account in the tax code." },
                  { n:5, a:"Max Roth IRA ($7,000/yr, $8,000 at 50+)",    w:"Tax-free growth and withdrawals. Contributions accessible anytime. Overflow from monthly surplus goes here before brokerage." },
                  { n:6, a:"Max 401k / TSP ($23,500/yr in 2026)",        w:"After Roth IRA. Roth 401k portion is MAGI-neutral in retirement — keep in plan until 59½ if using Rule of 55." },
                  { n:7, a:"Taxable brokerage with remaining surplus",    w:"No contribution limits. LTCG rates. Use for overflow beyond Roth IRA + 401k max." },
                  { n:8, a:p.retAge>=55?"Keep Roth 401k in plan until 59½":"Start Roth conversion ladder 5 yrs before FIRE", w:p.retAge>=55?"Rule of 55 gives penalty-free access to Roth 401k earnings. Rolling to IRA before 59½ loses this. Consolidate into Roth IRA after 59½.":"5-year runway needed. Convert traditional → Roth in low-income retirement years to minimize lifetime taxes." },
                ].map(({ n,a,w })=>(
                  <div key={n} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
                    <div style={{ ...S.mono, fontSize:15, color:C.cyan, fontWeight:700, minWidth:18, lineHeight:1.2 }}>{n}</div>
                    <div>
                      <div style={{ fontSize:12, color:C.text, fontWeight:500 }}>{a}</div>
                      <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>{w}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RetirementCalc));
</script>
</body>
</html>
